- enum: viskores::filter::mesh_info::IntegrationType
  header: viskores/filter/mesh_info/CellMeasures.h
  pythonName: IntegrationType
  guard: VISKORES_PYTHON_ENABLE_FILTER_MESH_INFO
  enumOptions:
    - arithmetic
    - flag
  values:
    - None
    - ArcLength
    - Area
    - Volume
    - AllMeasures

- enum: viskores::filter::mesh_info::CellMetric
  header: viskores/filter/mesh_info/MeshQuality.h
  pythonName: CellMetric
  guard: VISKORES_PYTHON_ENABLE_FILTER_MESH_INFO
  values:
    - Area
    - AspectGamma
    - AspectRatio
    - Condition
    - DiagonalRatio
    - Dimension
    - Jacobian
    - MaxAngle
    - MaxDiagonal
    - MinAngle
    - MinDiagonal
    - Oddy
    - RelativeSizeSquared
    - ScaledJacobian
    - Shape
    - ShapeAndSize
    - Shear
    - Skew
    - Stretch
    - Taper
    - Volume
    - Warpage
    - None

- class: viskores::filter::mesh_info::CellMeasures
  base: viskores::filter::Filter
  properties:
    - CellMeasureName
  directMethods:
    - SetMeasureToArcLength
    - SetMeasureToArea
    - SetMeasureToVolume
    - SetMeasureToAll
  methods:
    - SetMeasure(measure: viskores::filter::mesh_info::IntegrationType)
    - GetMeasure() -> viskores::filter::mesh_info::IntegrationType

- class: viskores::filter::mesh_info::GhostCellClassify
  base: viskores::filter::Filter
  properties:
    - GhostCellName

- class: viskores::filter::mesh_info::MeshQuality
  pythonName: MeshQuality
  base: viskores::filter::Filter
  directMethods:
    - GetMetricName
  methods:
    - SetMetric(metric: viskores::filter::mesh_info::CellMetric)
    - GetMetric() -> viskores::filter::mesh_info::CellMetric

- class: viskores::filter::mesh_info::MeshQualityArea
  binding: excluded
  reason: Use MeshQuality with the corresponding metric selector instead of binding this metric subclass separately.

