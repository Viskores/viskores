- class: viskores::io::BOVDataSetReader
  constructors:
    - (file_name: std::string)
  methods:
    - ReadDataSet() -> viskores::cont::DataSet

- enum: viskores::io::FileType
  header: viskores/io/VTKDataSetWriter.h
  pythonName: FileType
  guard: VISKORES_PYTHON_ENABLE_IO
  values:
    - ASCII
    - BINARY

- class: viskores::io::ImageWriterBase
  binding: manual
  reason: Keep exposed for C++ API fidelity as the abstract base of concrete image writers and owner of PixelDepth; revisit whether this should ever be generated.
  enums:
    - "PixelDepth: PIXEL_8, PIXEL_16"

- class: viskores::io::ImageReaderBase
  binding: excluded
  reason: Abstract implementation base for image readers.

- class: viskores::io::ImageReaderHDF5
  guard: VISKORES_PYTHON_ENABLE_IO_HDF5
  constructors:
    - (file_name: std::string)
  methods:
    - ReadDataSet() -> viskores::cont::DataSet
    - GetPointFieldName()
    - SetPointFieldName(name: std::string)
    - GetFileName()
    - SetFileName(file_name: std::string)

