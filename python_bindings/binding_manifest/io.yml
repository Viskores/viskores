    - GetPixelDepth() -> viskores::io::ImageWriterBase::PixelDepth
    - SetPixelDepth(pixel_depth: viskores::io::ImageWriterBase::PixelDepth)
    - GetFileName()
    - SetFileName(file_name: std::string)

