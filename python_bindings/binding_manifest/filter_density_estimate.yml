- class: viskores::filter::density_estimate::ContinuousScatterPlot
  pythonName: ContinuousScatterPlot
  binding: manual
  reason: Requires active field pair helper.

- class: viskores::filter::density_estimate::Entropy
  fieldInputs:
    - ActiveField
  properties:
    - OutputFieldName
    - NumberOfBins
  directMethods:
    - GetActiveFieldAssociation
  methodAdapters:
    - Execute

- class: viskores::filter::density_estimate::Histogram
  fieldInputs:
    - ActiveField
  properties:
    - OutputFieldName
    - NumberOfBins
    - Range
  directMethods:
    - GetActiveFieldAssociation
    - GetBinDelta
    - GetComputedRange
  methodAdapters:
    - Execute

- class: viskores::filter::density_estimate::NDEntropy
  pythonName: NDEntropy
  binding: manual
  reason: Requires variable field list handling.

- class: viskores::filter::density_estimate::NDHistogram
  pythonName: NDHistogram
  binding: manual
  reason: Requires variable field list handling.

- class: viskores::filter::density_estimate::ParticleDensityBase
  binding: excluded
  reason: Implementation base for concrete particle density filters.

- class: viskores::filter::density_estimate::ParticleDensityCloudInCell
  pythonName: ParticleDensityCloudInCell
  binding: deferred

- class: viskores::filter::density_estimate::ParticleDensityNearestGridPoint
  pythonName: ParticleDensityNearestGridPoint
  binding: deferred

- class: viskores::filter::density_estimate::Statistics
  fieldInputs:
    - ActiveField
  directMethods:
    - GetActiveFieldAssociation
  methodAdapters:
    - Execute
