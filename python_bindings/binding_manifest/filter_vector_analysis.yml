- class: viskores::filter::vector_analysis::CrossProduct
  fieldInputs:
    - PrimaryField
    - SecondaryField
  methodAdapters:
    - PrimaryCoordinateSystem
    - SecondaryCoordinateSystem
    - Execute

- class: viskores::filter::vector_analysis::DotProduct
  fieldInputs:
    - PrimaryField
    - SecondaryField
  methodAdapters:
    - PrimaryCoordinateSystem
    - SecondaryCoordinateSystem
    - Execute

- class: viskores::filter::vector_analysis::Gradient
  pythonName: Gradient
  binding: manual
  reason: Requires gradient-specific controls.

- class: viskores::filter::vector_analysis::SurfaceNormals
  properties:
    - GenerateCellNormals
    - NormalizeCellNormals
    - GeneratePointNormals
    - CellNormalsName
    - PointNormalsName
    - AutoOrientNormals
    - FlipNormals
    - Consistency
  methodAdapters:
    - Execute

- class: viskores::filter::vector_analysis::VectorMagnitude
  pythonName: VectorMagnitude
  pythonModule: viskores.filter.vector_analysis
  guard: VISKORES_PYTHON_ENABLE_FILTER_VECTOR_ANALYSIS
  fieldInputs:
    - ActiveField
  properties:
    - OutputFieldName
  methodAdapters:
    - CoordinateSystem
    - Execute
