- class: viskores::filter::image_processing::ComputeMoments
  pythonName: ComputeMoments
  base: viskores::filter::Filter
  fieldInputs:
    - ActiveFieldAssociation
  methods:
    - SetRadius(radius: double)
    - SetSpacing(spacing: viskores::Vec3f)
    - SetOrder(order: viskores::Int32)

- class: viskores::filter::image_processing::ImageDifference
  base: viskores::filter::Filter
  fieldInputs:
    - PrimaryField
    - SecondaryField
  properties:
    - ThresholdFieldName
    - AverageRadius
    - PixelShiftRadius
    - AllowedPixelErrorRatio
    - PixelDiffThreshold
  directMethods:
    - GetImageDiffWithinThreshold

- class: viskores::filter::image_processing::ImageMedian
  base: viskores::filter::Filter
  directMethods:
    - Perform3x3
    - Perform5x5
