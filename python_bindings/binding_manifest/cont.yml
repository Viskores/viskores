- class: viskores::cont::Field
  doc: Named data array with a name, association, and values attached to a Viskores DataSet.
  registrationGroup: early
  constructors:
    - ()
    - (name: std::string, association: viskores::cont::Field::Association, data: viskores::cont::UnknownArrayHandle)
  enums:
    - "Association: Any, WholeDataSet, Points, Cells, Partitions, Global"
  methods:
    - GetName()
    - GetAssociation()
    - GetNumberOfValues()
    - IsCellField()
    - IsPointField()
    - IsWholeDataSetField()
    - IsPartitionsField()
    - IsGlobalField()
    - IsSupportedType()
    - GetData() -> viskores::cont::UnknownArrayHandle&
    - GetDataAsDefaultFloat()
    - GetDataWithExpectedTypes()
    - ConvertToExpected()
    - SetData(newdata: viskores::cont::UnknownArrayHandle)

- class: viskores::cont::CoordinateSystem
  doc: Field subclass used as a Viskores coordinate system.
  base: viskores::cont::Field
  registrationGroup: early
  constructors:
    - ()
    - (name: std::string, values: viskores::cont::UnknownArrayHandle [UnknownArray])
    - (name: std::string, dimensions: viskores::Id3, origin: viskores::Vec3f [Vec3fDefaultZero] = nb::none(), spacing: viskores::Vec3f [Vec3fDefaultOne] = nb::none())
    - (field: const viskores::cont::Field&)
  methods:
    - GetNumberOfPoints()
    - GetData() -> viskores::cont::UncertainArrayHandle<viskores::TypeListFieldVec3, VISKORES_DEFAULT_STORAGE_LIST> [CoordinateSystemData]
    - SetData(values: viskores::cont::UnknownArrayHandle [UnknownArray])
    - GetRange() -> viskores::Vec<viskores::Range, 3>
    - GetBounds()

