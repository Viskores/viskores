.vtk_contract_base:
  stage: contract
  timeout: 2 hours
  interruptible: true
  variables:
    CCACHE_BASEDIR:       "$CI_PROJECT_DIR"
    CCACHE_COMPILERCHECK: "content"
    CCACHE_IGNOREOPTIONS: "-isystem=*"
    CCACHE_NOHASHDIR:     "true"
  before_script:
    - .gitlab/ci/config/cmake.sh
    - export PATH=$PWD/.gitlab/cmake/bin:$PATH
    - cmake --version
    - "cmake -VV -P .gitlab/ci/config/ninja.cmake"
    - export PATH="${PWD}/.gitlab:${PATH}"
    - "CCACHE_INSTALL_DIR=${PWD}/.gitlab cmake -V -P .gitlab/ci/config/ccache.cmake"
    - export PATH="${PWD}/.gitlab/ccache:${PATH}"
    - ccache -z
  script:
    - .gitlab/ci/config/vtk_contract.sh
  after_script:
    - export PATH="${PWD}/.gitlab/ccache:${PATH}"
    - ccache -v -s
    - ccache -z
  allow_failure: false

# Build VTK against a CPU-only Viskores installation
vtk_serial:
  extends:
    - .vtk_contract_base
    - .ubuntu2204
    - .run_automatically
    - .uo_cpu_tags
  variables:
    CCACHE_RESHARE: "true"
  needs:
    - job: ubuntu2404_gcc14
      artifacts: true

# Build VTK against a CUDA-enabled Viskores installation
vtk_cuda:
  extends:
    - .vtk_contract_base
    - .ubuntu2204_cuda122
    - .run_automatically
  tags:
    - nvidia-a100
    - x86_64-nvidiagpu
  needs:
    - job: ubuntu2404_gcc14_cuda130
      artifacts: true
