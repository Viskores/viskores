build:ubuntu2004_kokkos37:
  tags:
    - large
    - uo
    - public
    - x86_64
  extends:
    - .ubuntu2004_kokkos
    - .cmake_build_linux
    - .run_automatically
  variables:
    CMAKE_BUILD_TYPE: RelWithDebInfo
    CMAKE_PREFIX_PATH: "/opt/anari"
    VISKORES_SETTINGS: "kokkos+shared+64bit_floats+rendering+anari+ccache"

# Build on ubuntu2004 with TBB and OpenMP and test on ubuntu2004
# Uses gcc 9
# Uses MPICH2
build:ubuntu2004_gcc9:
  tags:
    - large
    - uo
    - public
    - x86_64
  extends:
    - .ubuntu2004
    - .cmake_build_linux
    - .run_automatically
  variables:
    CC: "gcc-9"
    CXX: "g++-9"
    CMAKE_BUILD_TYPE: Debug
    VISKORES_SETTINGS: "benchmarks+tbb+openmp+mpi+shared+hdf5+ccache"
    #Restrict OpenMP number of threads since multiple test stages
    #execute on the same hardware concurrently
    OMP_NUM_THREADS: 4

build:ubuntu2004_gcc9_cuda:
  tags:
    - nvidia-a100
    - uo-gpu
    - x86_64-nvidiagpu
  extends:
    - .ubuntu2004_cuda
    - .cmake_build_linux
    - .run_automatically
  variables:
    CC: "gcc-9"
    CXX: "g++-9"
    CMAKE_BUILD_TYPE: RelWithDebInfo
    VISKORES_SETTINGS: "cuda+ampere+shared+ascent_types+32bit_ids+64bit_floats+ccache"

# Build on ubuntu2004 with tbb and test on ubuntu2004
# Uses clang 5
build:ubuntu2004_clang6:
  tags:
    - large
    - uo
    - public
    - x86_64
  extends:
    - .ubuntu2004
    - .cmake_build_linux
    - .run_automatically
  variables:
    CC: "clang-6.0"
    CXX: "clang++-6.0"
    CMAKE_BUILD_TYPE: Debug
    VISKORES_SETTINGS: "tbb+static+64bit_floats+ccache"
    CTEST_EXCLUSIONS: "make_built_against_test_install"
