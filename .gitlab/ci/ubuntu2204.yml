# Build on ubuntu2204 with CUDA + MPI and test on ubuntu2204
# Uses gcc 7
# Uses MPICH2
build:ubuntu2204_gcc11:
  tags:
    - large
    - uo
    - public
    - x86_64
  extends:
    - .ubuntu2204_cuda
    - .cmake_build_linux
    - .run_automatically
  variables:
    CC: "gcc-7"
    CXX: "g++-7"
    CUDAHOSTCXX: "g++-7"
    VISKORES_SETTINGS: "benchmarks+cuda+hopper+mpi+64bit_floats+shared"

test:ubuntu2204_gcc11:
  tags:
    - nvidia-a100
    - uo-gpu
    - x86_64-nvidiagpu
  extends:
    - .ubuntu2204_cuda
    - .cmake_test_linux
    - .run_automatically
  needs:
    - build:ubuntu2204_gcc11


# Build on ubuntu2204 with CUDA+TBB and test on ubuntu2204
# Uses clang as CUDA host compiler
# Runs only on nightlies
build:ubuntu2204_clang11_cuda:
  tags:
    - large
    - uo
    - public
    - x86_64
  extends:
    - .ubuntu2204_cuda
    - .cmake_build_linux
    - .run_automatically
    # - .run_upstream_branches
  variables:
    CC: "clang-11"
    CXX: "clang++-11"
    CUDAHOSTCXX: "clang++-11"
    VISKORES_SETTINGS: "cuda+ampere+tbb+examples+shared"

test:ubuntu2204_clang11_cuda:
  tags:
    - nvidia-a100
    - uo-gpu
    - x86_64-nvidiagpu
  extends:
    - .ubuntu2204_cuda
    - .cmake_test_linux
    - .run_automatically
    # - .run_upstream_branches
  needs:
    - build:ubuntu2204_clang_cuda

# Build on ubuntu2204 with OpenMP and test on ubuntu2204
# Uses gcc 6.5
build:ubuntu2204_gcc10:
  tags:
    - large
    - uo
    - public
    - x86_64
  extends:
    - .ubuntu2204
    - .cmake_build_linux
    - .run_automatically
  variables:
    CC: "gcc-10"
    CXX: "g++-10"
    VISKORES_SETTINGS: "openmp+shared+examples"

test:ubuntu2204_gcc10:
  tags:
    - large
    - uo
    - public
    - x86_64
  extends:
    - .ubuntu2204
    - .cmake_test_linux
    - .run_automatically
  variables:
    #Restrict OpenMP number of threads since multiple test stages
    #execute on the same hardware concurrently
    OMP_NUM_THREADS: 3
  needs:
    - build:ubuntu2204_gcc10

# Build on ubuntu2204 with TBB and test on ubuntu2204
# Uses clang 8
build:ubuntu2204_clang12:
  tags:
    - large
    - uo
    - public
    - x86_64
  extends:
    - .ubuntu2204
    - .cmake_build_linux
    - .run_automatically
  variables:
    CC: "clang-12"
    CXX: "clang++-12"
    CMAKE_BUILD_TYPE: Debug
    VISKORES_SETTINGS: "tbb+shared+examples"

test:ubuntu2204_clang12:
  tags:
    - large
    - uo
    - public
    - x86_64
  extends:
    - .ubuntu2204
    - .cmake_test_linux
    - .run_automatically
  needs:
    - build:ubuntu2204_clang12

# Build on ubuntu2204 with kokkos and test on ubuntu2204
# Uses CUDA 11
build:ubuntu2204_kokkos37:
  tags:
    - large
    - uo
    - public
    - x86_64
  extends:
    - .ubuntu2204_cuda_kokkos
    - .cmake_build_linux
    - .run_automatically
  variables:
    CMAKE_GENERATOR: "Ninja"
    CMAKE_BUILD_TYPE: Release
    VISKORES_SETTINGS: "benchmarks+kokkos+hopper+64bit_floats+shared"

test:ubuntu2204_kokkos37:
  tags:
    - nvidia-h100
    - uo-gpu
    - x86_64-nvidiagpu
  extends:
    - .ubuntu2204_cuda_kokkos
    - .cmake_test_linux
    - .run_automatically
  needs:
    - build:ubuntu2204_kokkos37
